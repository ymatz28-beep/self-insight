# === Interpretations (AI-generated narrative) ===
interpretations:
  hero:
    tagline: "太陽のような温かさで人を照らし、中心で全体を統合するリーダー"
    traits:
      - keyword: "太陽の温かさ"
        detail: "周囲を照らし、元気づける存在"
        source: "四柱推命"
      - keyword: "♌ 情熱と表現力"
        detail: "獅子座の輝き — 自分を表現する力"
        source: "西洋占星術"
      - keyword: "中心の統率力"
        detail: "九星の帝王星 — 全体を動かす求心力"
        source: "九星気学"
      - keyword: "献身的な愛情"
        detail: "相手のニーズを先読みする共感力"
        source: "エニアグラム"
      - keyword: "誠実さと計画性"
        detail: "約束を守り、信頼を積み上げるA型"
        source: "血液型"
      - keyword: "堅実さ×冒険心"
        detail: "霊合星人 — 安定志向の中に隠された革新"
        source: "六星占術"
  integrated_insight:
    - "あなたの本質は<strong>「太陽のような温かさで人を照らし、中心で全体を統合するリーダー」</strong>です。四柱推命の日主「丁火」（ロウソクの炎）× 九星気学の五黄土星（九星の中央に座る帝王星）× 獅子座（太陽が支配する王者の星座）。この三角形が示すのは、<strong>火のエネルギーで周囲を温め、求心力で人を集め、献身的な愛情（エニアグラム2）で支える</strong>という二重の「照らす力」です。獅子座の火のエレメントは情熱と生命力を与え、不動宮（Fixed）の性質は「信じた道を貫く」忍耐力を示します。"
    - "A型（日本人口の40%）の真面目さ×計画性は、あなたの行動基盤そのもの。チームの中で信頼を積み上げ、几帳面に約束を守る。この「堅実な実行者」の姿は、土星人(−)の安定志向と完全に共鳴しています。一方で、霊合サブ星の天王星人(−)が内側に革新への衝動を燃やしている — <strong>堅実さの中に隠された冒険心</strong>が、表面的な「真面目な人」像では捉えきれない多面性を生んでいます。エニアグラム2のウイング6（忠実家）が、この冒険心に「安全確認」のブレーキをかけることで、無謀にならない革新を可能にしています。"
    - "あなたの感覚は繊細で、人の感情の微妙な変化を敏感に察知します。特に社会的な場面での感受性が高く、場の空気を瞬時に読み取る力がある。エニアグラム2の「相手が求めていることを言われる前に察知する」才能と、この繊細さが組み合わさることで、<strong>「この人といると安心する」と思われる存在</strong>になっています。一方で、<strong>興味の対象が移り変わりやすく、複数のことを同時に追いかける傾向</strong>がある。五黄土星の強い推進力と獅子座の情熱がこの多動性に拍車をかけますが、裏を返せば<strong>幅広い関心から異分野を接続するイノベーターの素質</strong>でもあります。"
    - "<strong style=\"color:var(--yellow);\">注意すべきポイント — 全体系が一致する弱点</strong>: 五行で<strong>土（安定・信頼の基盤）が完全に欠如</strong>。これは五黄「土」星でありながら命式に土がないという逆説的構造で、<strong>強い求心力を持ちながらも自分自身の「居場所」への不安</strong>が潜在する。繊細な感受性とエニアグラム2の献身性は最大の武器ですが、<strong>他者のために自分を消耗しすぎて燃え尽きる</strong>リスクが常にある。ストレス下でType 8（挑戦者）に退行すると、普段の温かさが突然の攻撃性に転じ、周囲との信頼関係にひびが入る。<strong>自分のニーズにも目を向ける仕組み（定期的な内省・境界線設計）</strong>が、持続的に人を支え続けるための鍵です。"
  strengths_ja: {}
  personality:
    enneagram: "人への奉仕と愛情の人。他者のニーズを言われる前に察知し、献身的に支える。ウイング6（忠実家）の影響で、信頼できる人間関係の構築を重視。健全時はType 4（個性派）に向かい、自分自身の感情やニーズにも目を向けられる。ストレス時はType 8（挑戦者）に向かい、攻撃的・支配的になる傾向。"
    blood_type: "日本人口の40%。真面目で責任感が強く、計画性に優れる。協調性が高くチームプレイヤーとして信頼される。一方で心配性でストレスを溜めやすく、融通が利かない面も。「こうあるべき」という理想が高いため、自分にも他者にも厳しくなりがち。"
    sensitivity: "人の感情の変化を敏感に察知し、場の空気を瞬時に読み取る繊細さ。特に社会的な感受性が高く、人間関係の微妙な変化にとくに敏感。エニアグラム2の献身性と組み合わさり、「相手が求めていることを先回りで察知する」才能の源泉。ネガティブな環境からの回復には意識的な自分時間が必要。"
    focus_pattern: "複数の興味を同時に追いかけ、対象間を自由に行き来する探究スタイル。獅子座の情熱と五黄土星の推進力がこのエネルギーに拍車をかける。一つのテーマに没頭する過集中モードと、次の刺激へ飛ぶ拡散モードの波がある。仕組み化とルーティン設計で安定した実行力を補うことが効果的。"
  four_pillars:
    overview: "四柱推命は生年月日時の4つの柱から、先天的な性質・才能・人生の傾向を読み解く東洋最高峰の命術。各柱が人生の異なる側面を表します。"
    year: "陰の草花（乙）と亥（猪・水）の組み合わせ。社会に対して柔軟で控えめな印象を与えるが、内面に水のような深い知恵と直感力を秘める。先祖から受け継いだ「穏やかに、しかし止まらない推進力」。"
    month: "大木（甲）と申（猿・金）の組み合わせ。キャリアの柱に真っすぐな大木の誠実さと、猿の器用さ・知恵が同居。仕事では正道を歩みつつも機転が利く。甲木は日主の丁火を燃やす薪 — 仕事が情熱の燃料になる配置。"
    day: "本質は陰火（丁）と卯（兎・木）。兎の穏やかさと木のエネルギーに支えられた炎 — 木が火を生む「相生」の関係で、エネルギーが尽きない構造。直感力が鋭く、人の心を照らす使命を持つ。"
    day_master_detail: "ロウソクの炎。静かで温かく人を照らす。強い意志を内に秘め、感受性豊かで人の心の機微を感じ取る。丙火（太陽）のような自己主張ではなく、暗闇の中で必要な人にだけ光を届ける繊細な存在。五行で木が50%と最も多く、日主の丁火に絶えず薪を供給する構造 — エネルギッシュだが燃え尽きリスクにも注意。"
  nine_star_ki:
    year: "五黄土星は九星の中央に位置する「帝王星」。九星の中で最も強い求心力を持ち、周囲を自然と引きつけるカリスマ性があります。土の性質は「受容と安定」— すべてを受け入れる大地の力。リーダーシップは命令型ではなく、中心に座って全体を統合する「座長型」。ただし、その強さゆえに独善的になるリスクも。"
    month: "月命星も五黄土星という珍しい二重の五黄。外面（本命星）も内面（月命星）も同じ「帝王の星」。表裏がなく、見た目の印象と内面が一致している。一貫した存在感があり、ブレない芯の強さが特徴。ただし、二重の五黄は頑固さも二倍 — 柔軟性を意識的に補う必要がある。"
  rokusei:
    main: "土星人(−)は安定志向で堅実な星人。着実に物事を積み上げていくタイプで、急な変化を好まない。忍耐力があり、長期的な視点で物事を進められる。(−)は偶数年生まれを示し、陰の性質（慎重・内省的）がベースにある。"
    sub: "天王星人(−)は独創的で自由を愛する星人。既存の枠に収まらない発想力と、変化を恐れない冒険心を持つ。周囲からは「変わっている」と見られることもあるが、その独自の視点が革新を生む。"
    reigou: "霊合星人として、土星人の堅実さと天王星人の革新性という相反する性質を同時に持つ。全人口の約16%が該当し、運気の振れ幅が通常の2倍。2026年はメイン星（土星人）が財成で好調だが、サブ星（天王星人）が陰影で大殺界入り — 矛盾する運気が同時進行する。表面的には好調に見えても、内面で不安定さを感じやすい年。2028年からはメイン星も大殺界に入るため、2026-2027年は重要な準備期間。"

