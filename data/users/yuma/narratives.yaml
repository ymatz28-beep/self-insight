- title: Empathy × HSP × エニアグラム4
  analysis: |-
    3つの特性が共鳴し、「人の感情を深く理解し、独自の視点で表現する力」を形成。Empathy（CliftonStrengths 1位）は他者の感情を「体感」するレベルの共感力。HSPの「深い情報処理」がその感覚をさらに増幅し、エニアグラム4の「独自の表現欲求」が最終出力として形にする。Self-Insightサービスの核心 — ユーザーの痛みを自分事として感じられることがPMFの源泉。
  practice_guide: |-
    この強みを最大化するには「エネルギー管理」がすべて。HSP × Empathyの組み合わせは、他者のネガティブな感情も吸収してしまうため、意識的な境界線の設計が不可欠。具体的には: 1対1の深い対話（Empathyが輝く場）と、1人の内省時間（回復の場）を交互に配置する。週に2日は「社交ゼロの日」を死守する。サウナ・瞑想・自然の中での散歩が最も効果的なデトックス手段。
- title: Intellection × ADHD × 丁火（陰火）
  analysis: |-
    深い思考力（Intellection 2位）はあるが、ADHDの波で集中が途切れやすい。丁火（ロウソクの炎）は風に弱い — 環境を整えれば安定して燃え続ける。3つの特性の相互作用を理解することが重要: Intellectionは「深く考え続けたい」、ADHDは「新しい刺激に飛びつきたい」、丁火は「静かな環境で安定して燃えたい」。この三者のバランスが崩れると過集中→燃え尽きのサイクルに陥る。
  practice_guide: |-
    自動化で雑務を排除し、思考に没頭できる環境を作る（Claude Code活用は正解）。「ADHDの新しい刺激への反応性」を敵ではなく武器にするには、探索の時間（新しいアイデアを追う）と深掘りの時間（1つのテーマに集中する）を明確に分離する。ポモドーロ的に「25分集中→5分探索」のサイクルが丁火の安定燃焼パターンに合う。環境ノイズ（通知・SNS・不要なメール）を物理的に遮断する仕組みが最重要。
- title: Deliberative × AB型 × 蠍座Fixed
  analysis: |-
    3つとも「慎重・一度決めたら変えない」を指す。Deliberative（慎重さ 3位）は意思決定前のリスク評価、AB型は合理的分析、蠍座のFixed（不動宮）は粘り強い執着。三重の慎重さは、深い分析に基づく確実な意思決定を可能にする最大の強み。一方で「分析麻痺」に陥りやすく、行動が遅れてチャンスを逃す場面がある。五行の金（決断力）の欠如がこの傾向をさらに強化している。
  practice_guide: |-
    Activator（SF 8位）を意識的に発動させることで補完する。具体的なルール: 「情報が7割揃ったら決断する。10割を待たない」「分析は最大3日。それ以上は行動に移す」「小さな賭けで検証し、大きな判断は結果を見てから」。投資判断においては特に有効 — Deliberativeの慎重な分析でリスクを特定し、Activatorで実行タイミングを逃さない。蠍座のFixed特性は「一度始めたらやめない」強みにもなるため、始動さえすれば問題ない。
- title: Connectedness × 七赤金星 × 坤宮2026
  analysis: |-
    全てを繋げて見る直感力（Connectedness 4位）と、社交力と言葉の力で人を動かす特質（七赤金星）。一見無関係に見えるプロジェクト間のシナジーを発見し、それを言語化して人を巻き込む力は、Yumaのポートフォリオ全体を統合するメタスキル。2026年の坤宮は「地を耕す」年 — 点在するプロジェクト群を繋ぎ、2029年の絶頂に向けたエコシステムを設計するのに最適なタイミング。
  practice_guide: |-
    2026年中に「全プロジェクトの相互接続マップ」を完成させる。inbox-zero → kaizen-agent → stock-analyzer → wealth-strategy の自動化チェーンを意識し、データフローの最適化を図る。七赤金星の社交力は「人を通じた情報」の獲得に使う — 11月の「再会」フェーズで、大殺界期に疎遠になった人脈を戦略的に回復させる。Connectednessの「偶然の一致を見逃さない」直感は、情報の海の中から重要なシグナルを拾う力でもある。
- title: Maximizer × 3S原則 × 7つの習慣
  analysis: |-
    「良い→最高」の追求（Maximizer 5位）はYumaのOSそのもの。3S（Simple, Scalable, Sustainable）でフィルターし、7つの習慣の第II領域（重要×非緊急）に集中投資する — この組み合わせが、日々の自動化・最適化パイプラインの設計思想の根幹。Maximizerは「平均を引き上げる」のではなく「突出した強みをさらに伸ばす」ことに意味がある。Self-Insightサービスの差別化要因でもある: 占いで終わらず、フレームワークで行動に落とし込む。
  practice_guide: |-
    Maximizerの「完璧を求めすぎる」リスクへの対策: 「80%で出して、フィードバックで磨く」を原則にする。3Sの「Simple」が最も重要なブレーキ — 「もっと良くしたい」衝動を「もっとシンプルにできないか？」で制御する。7つの習慣の第II領域（重要×非緊急）に毎日30分以上を確保し、長期的な価値を生むプロジェクトに投資する。Maximizerは弱みの修正ではなく強みの極大化に使うこと。ADHDのエネルギー配分も含め、「何をやらないか」の決断がMaximizerの真価を発揮する条件。
