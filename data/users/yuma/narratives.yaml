# Self-Insight Narratives — Yuma Tejima
# Extracted from index.html (hand-crafted Phase 0 content)
# Used by generate_dashboard.py to populate HTML templates

core_identity:
  integrated_insight:
    paragraph_1_essence: |-
      あなたは静かな炎と鋭い言葉を持つ人です。四柱推命の日主「丁火」はロウソクの炎 — 周囲を温かく照らしながら、内に強い意志を秘めています。九星気学の七赤金星は「沢」の社交力と言葉の力。この二つの組み合わせが、深い共感力（Empathy #1）で人の本質を見抜き、的確な言葉で伝えるという稀有な能力を生んでいます。実際に、CliftonStrengthsでEmpathyが34資質中1位であることは、他者の感情を「理解」するのではなく「体感」するレベルの共感力を意味しています。これは1万人に1人レベルの組み合わせです。
    paragraph_2_depth: |-
      蠍座の「変容の力」、エニアグラム4の「独自性の追求」、HSPの「繊細な感覚処理」— これらすべてが本質を見抜き、深く掘り下げ、独自の形で表現する方向を指しています。表面的なことに興味がなく、物事の核心に到達するまで止まらない。蠍座の支配星である冥王星（Pluto）は「死と再生」を司る星 — 既存の枠組みを壊して再構築する力がここから来ています。エニアグラム4の「自分だけの美学」とHSPの「微細な差異を感知する能力」が合わさることで、他者には見えない洞察を言語化する才能が生まれています。
    paragraph_3_duality: |-
      AB型の「合理性×感性」の二面性が、論理的フレームワーク（3S, MECE）と感情的共感を両立させる。木星人(−)霊合星人の二重性も同じ構造 — 相反する特質を統合する力がYumaの最大の特徴。日本人口のわずか10%しかいないAB型の「合理と感性の共存」は、データ分析とヒューマンインサイトを同時に扱うAIエージェント設計にそのまま反映されています。霊合星人は二つの星の運気を同時に受けるため振れ幅が大きいですが、その分「普通では到達できない高み」にも届く特性を持っています。
    paragraph_4_watch_out: |-
      注意すべきポイント — 全体系が一致する弱点: 五行で金（決断力・収穫）と水（柔軟性・知恵）が完全に欠如しており、これは優柔不断さや状況変化への対応の遅さとして現れます。HSPの繊細さとEmpathy #1の共感力は最大の強みですが、裏返すと他者のエネルギーを吸収しすぎて消耗するリスクが常にあります。ADHD傾向による「過集中と散漫の波」は、システムや仕組みがないと一貫した実行力に欠ける原因になります。また、エニアグラム4はストレス下でType 2（自己犠牲的な奉仕者）に向かう傾向があり、本来の独自性を捨てて他者に合わせすぎる危険性があります。これらの弱点を理解した上で、仕組み化（自動化・ルーティン・境界線設計）で補うことがYumaのOSの本質です。
  summary_cards:
    core_essence:
      title: 丁火 × 七赤金星
      subtitle: 静かな炎 × 言葉の力
    strongest_axis:
      title: 共感 × 洞察
      subtitle: Empathy + Intellection + HSP
    duality:
      title: 合理 × 感性
      subtitle: AB型 × 霊合星人 × Enneagram 4
    watch_out:
      title: 金・水の欠如
      subtitle: 決断力 × 柔軟性を意識的に補う
personality:
  clifton_intro: |-
    Gallup社が開発した34の才能テーマから、最も自然に発揮される上位5つの強み。TOP5は「意識せずとも繰り返し現れる思考・感情・行動のパターン」であり、努力で伸ばすべきスキルではなく、生まれ持った才能の核を示します。同じTOP5の組み合わせを持つ人は3,300万人に1人 — つまり完全にユニークな強みのDNAです。
  clifton_top5:
  - name: Empathy
    name_jp: 共感性
    domain: Relationship Building
    description: |-
      他者の感情を「推測」するのではなく「体感」する。言語化されていない不安や喜びを直感的に察知し、その人が本当に求めていることを理解する力。チームリーダーとしての最大の武器であり、サービス設計においてユーザーの痛みを自分事として感じられるPMFの源泉。
  - name: Intellection
    name_jp: 内省
    domain: Strategic Thinking
    description: |-
      思考することそのものが活動。1人の時間に頭の中で概念を回し、深い洞察に到達する。表面的な情報交換ではなく、哲学的な問いや構造的な分析を好む。このダッシュボード自体が、Intellectionが駆動する「自己を体系的に理解したい」という欲求の産物。
  - name: Deliberative
    name_jp: 慎重さ
    domain: Executing
    description: リスクを事前に感知し、慎重に選択肢を評価する。衝動的な判断を避け、深い分析に基づいて確実な意思決定をする力。投資判断や事業設計において、見えないリスクを察知する「守りの強み」。ただし行動の遅れにつながるリスクもある。
  - name: Connectedness
    name_jp: 運命思考
    domain: Relationship Building
    description: 万物のつながりを直感的に感じ取る。一見無関係に見える出来事やアイデアの間に隠れた関連性を見出す力。占術と心理学と確率論を統合する発想、複数プロジェクト間のシナジーを設計する力の源泉。偶然を必然として捉える世界観。
  - name: Maximizer
    name_jp: 最上志向
    domain: Influencing
    description: |-
      「平均を良く」するのではなく「良いを最高に」引き上げる。弱みの修正より強みの極大化を追求する。3S原則（Simple, Scalable, Sustainable）の設計思想そのものがMaximizerの発露。「もっと良くできないか？」が止まらない性質は、自動化・最適化パイプラインの原動力。
  typology:
    enneagram:
      type: Type 4
      label: The Individualist
      description: 自己表現とアイデンティティの探求者。「自分だけの世界観」を持ち、平凡であることを嫌う。健全時はType 1（改革者）に向かい原則と美学を融合。ストレス時はType 2（奉仕者）に向かい、自分を犠牲にして他者に尽くしすぎる傾向。
    blood_type:
      type: AB
      label: 合理×感性の二面性
      description: 日本人口の10%。冷静な分析力と繊細な感性が同居。「二面性がある」と言われがちだが、実態は「状況に応じて最適なモードを切り替えている」合理的適応。
    hsp:
      type: High
      label: 感覚処理感受性
      description: |-
        全人口の15-20%が該当するHighly Sensitive Person。環境刺激（音・光・人の感情）を深く処理する神経特性。カフェの騒音、蛍光灯の明るさ、他人の不機嫌が通常以上にエネルギーを消耗させる。その代わり、美しいもの・深い会話からは何倍もの充足を得る。
    adhd:
      type: Leaning
      label: 過集中×散漫の波
      description: 診断未確定だが自己認識として傾向あり。興味のある対象には異常な過集中を発揮する一方、ルーティン作業は続かない。新しい刺激への反応性が高く、マルチタスク傾向。自動化パイプラインで定型業務を排除する設計思想の原点。
divination:
  four_pillars:
    intro: 四柱推命は生年月日時の4つの柱から、先天的な性質・才能・人生の傾向を読み解く東洋最高峰の命術。各柱が人生の異なる側面を表します。
    day_master: '日主: 丁火（陰火） — ロウソクの炎。静かで温かく人を照らす。強い意志を内に秘め、感受性豊かで人の心の機微を感じ取る。丙火（太陽）のような自己主張ではなく、暗闇の中で必要な人にだけ光を届ける繊細な存在。'
    pillar_details: |-
      年柱（乙卯）: 草花と兎の組み合わせ。社会に対して柔軟で穏やかな印象を与えるが、木の根のようにしなやかな強さを持つ。先祖から受け継いだ「人を和ませる空気感」。 月柱（丙戌）: キャリアの柱に太陽の火と忠犬の組み合わせ。仕事では情熱的で忠誠心が強い。丙（太陽）は日主の丁（ロウソク）を支える強い火源 — 仕事にエネルギーの根源がある配置。 日柱（丁未）: 本質は陰火と未（羊・土）。温かい土壌の上で灯る炎 — 安定した基盤の上で人を照らす使命。未は「未来」の未でもあり、先見性を暗示。
  nine_star_ki:
    honmei: |-
      本命星（七赤金星）は生まれた年から算出される「社会的な自分」。「沢」の象意を持ち、社交的で人を楽しませる力と、言葉に説得力を持つ話術に恵まれています。金星の「金運」は財を呼び込む力ですが、同時に散財しやすい傾向も。方位は西（兌宮）で、収穫と悦びの方角。
    getsu: |-
      月命星（九紫火星）は生まれた月から算出される「内面の自分」。外から見える社交的な七赤金星の内側に、九紫火星の激しい情熱と知的好奇心が燃えています。九紫火星は「離」の象意 — 物事を明らかにする光の力。知識欲が旺盛で美意識が高く、直感が鋭い。この本命星と月命星の二層構造が、「表面は穏やかな社交家、内面は激しい探求者」というYumaの二面性を形成しています。
  rokusei:
    jupiter: 木星人(−)は好奇心旺盛で行動力がある星人。自由を重んじ束縛を嫌い、常に新しいことに挑戦したがる冒険者タイプ。社交的で人脈が広く、興味の幅も広い。(−)は偶数年生まれを示し、陰の性質（内向き・慎重）がベースにある。
    venus: 金星人(−)はプライドが高く美意識がある星人。完璧主義的で「こだわり」が強い。人から尊敬されたい欲求が強く、自分の世界観を大切にする。
    reigo: |-
      霊合星人とは、メインの運命星に加えてサブの運命星の影響も同時に受ける特殊な存在。全人口の約16%が該当し、運気の振れ幅が通常の2倍になります。好調期は通常の人が到達できない高みに届きますが、不調期（大殺界）は通常以上に深く影響を受けます。メイン星とサブ星が好調なら「最高の年」、片方が大殺界なら「矛盾する年」、両方が大殺界なら「最大限の注意が必要な年」。Yumaの場合、木星人の自由奔放さと金星人の完璧主義という相反する性質が同居しており、これが「こだわりの強い冒険者」というユニークな人格を生んでいます。
  western:
    summary: 深い洞察力と変容の力。表面的なものに興味がなく、物事の本質を見抜く。強い意志と情熱を持ち、一度決めたことには徹底的に集中する。
    detail: |-
      支配星: 冥王星（Pluto） — 太陽系の最果てを周回する矮小惑星。「死と再生」「根本的な変容」を司り、蠍座に「既存の枠組みを破壊して再構築する力」を与えます。冥王星の影響下にある人は、表面的な変化では満足せず、物事の根底から作り直すことを好みます。Yumaが自動化パイプラインを「ゼロベースで再設計」することを厭わないのは、まさにこの冥王星的資質。 Fixed（不動宮）の性質は「一度決めたら梃子でも動かない」粘り強さ。水のエレメントと合わさることで「深い水底に沈んだ意志 — 表面からは見えないが、底流で確実に流れている」ような不屈の決意を形成します。出生時刻が判明すればアセンダント（上昇宮）と月星座が確定し、太陽・月・アセンダントの3軸で立体的な人物像が完成します。
forecast_2026:
  year_overview: |-
    2022年（陰影 × 兌宮）: 大殺界の入口。エネルギースコア15。表面上は平穏でも、見えない力で物事が停滞し始めた年。新しいことを始めても思うように進まず、人間関係にも微妙な摩擦が生まれやすい時期だった。 2023年（停止 × 艮宮）: 大殺界の底。エネルギースコア10。12年サイクルで最もエネルギーが低い年。自分の意志とは無関係に物事が止まる、あるいは後退する感覚。この時期に始めたことは定着しにくい。九星気学の艮宮（停滞・自己改革）とも重なり、「立ち止まって自分を見つめ直す」ことを強制された年。 2024年（減退 × 離宮）: 大殺界の出口。離宮の「注目」で表に出る機会は増えるが、六星の「減退」で実力を発揮しきれないもどかしさ。霊合合成スコア20は過去最低。ただしサブ星（金星人）の乱気（中殺界）も重なっており、二重の試練。 2025年（種子 × 坎宮）: 大殺界を脱し「種子」の芽吹き。坎宮は試練の宮だが、種を蒔く力は確実に戻っている。サブ星は「再会」で人脈の復活。霊合合成スコア64まで回復。 2026年（今年: 緑生 × 坤宮）: 種子から芽が出て成長し始める「緑生」。坤宮は「大地」の宮 — 変化と準備の年。霊合合成スコア73点。攻めずに仕込む年。2029年の絶頂に向けた3年計画の起点。サブ星は「財成」（エネルギー90）で金運が極めて高い。 2029年: 中宮（絶頂）× 達成 — 全体系が一致する最強の年。ここに向けて基盤を構築する。
  keywords:
  - title: 仕込みの年
    description: 坤宮は「大地を耕す」宮。2029年の大収穫に向けて、今は種を蒔き、水をやり、土壌を整える時期。焦って刈り取ろうとしない。
  - title: 基盤構築
    description: 自動化パイプライン、資産管理、健康習慣 — 地味だが将来のすべてを支える基盤を今年中に固めきる。緑生の成長エネルギーを基盤づくりに投下する。
  - title: 学習と吸収
    description: 九紫火星（月命星）の知的好奇心を最大活用。AI、投資、占術、心理学 — 2029年に爆発するための知識ストックを今年から意識的に積み上げる。
  - title: 人脈の再接続
    description: サブ星の「財成」と七赤金星の社交力を活かし、大殺界期に疎遠になった人脈を回復させる。無理に広げるより、既存の縁を深める方向で。
  - title: 健康投資
    description: 五行の金・水欠如に対する意識的な補完。サウナ（水の補完）、呼吸法（金の補完）、HSPに配慮した環境設計を習慣化する年。
  three_system_alignment: |-
    2029年: 九星気学「中宮（絶頂）」× 六星占術「達成」が重なる最強の年。ただし霊合サブ星は大殺界「停止」→ 大胆に攻めつつ足元は固める。 2028年: 九星気学は好調（巽宮）だが六星占術は小殺界「健弱」→ 健康面に注意しながら攻める。 2030年: 九星気学は高水準（乾宮）だが六星占術は中殺界「乱気」→ 判断ミスに注意。大きな新規投資は避ける。
  guidance:
    work:
    - 坤宮年 → 新規プロジェクトの「仕込み」に最適。派手な成果より基盤づくりを優先する
    - Self-Insight Phase 0完成 → PMF検証データ蓄積。ユーザーフィードバックを構造化して2027年のローンチに備える
    - 'Empathy #1 → チームマネジメントで差別化。メンバーの感情を察知し、1on1の質を高めることで信頼関係を強化'
    - Deliberative（慎重さ）を活かし、大きな意思決定は十分なデータを集めてから。ただしActivator（8位）を意識して「7割で動く」ルールも維持
    - 2-4月は六星大殺界 → 新規プロジェクト着手は5月以降に。2-4月は既存業務の質向上・学習・仕組み化に集中する
    money:
    - 坤宮 → 守りの年。基盤投資（インフラ・学習・健康）に集中。一発逆転型の投資は避ける
    - 2029年絶頂に向けた種蒔きにコスト配分。3年で回収できる投資テーマを今年選定する
    - 金欠如 → 損切りルールを数値で明確化。感情に流されず機械的に実行する仕組みを構築
    - サブ星「財成」（エネルギー90）→ 蓄積運は極めて高い。「入ってくる金」より「残す金」を意識。節約・節税を徹底
    - 七赤金星の散財傾向に注意。ボーナス月（6月・12月）は事前に支出上限を設定し、衝動的な大きな買い物を防ぐ
    health:
    - 金・水欠如 → 呼吸器（金）と腎臓・膀胱系（水）に注意。定期検診を年2回実施する
    - サウナ（水風呂）= 水の補完。週2-3回のペースを継続。心身のリセットとHSPのデトックスを兼ねる
    - HSP → 定期デトックス・1人時間を死守。週に最低1日は「予定のない日」を確保する
    - 8月が年間で最も注意が必要な月（六星小殺界「健弱」× 九星中凶）。夏バテ対策を7月から前倒しで準備する
    - ADHD傾向への対策としてルーティン化を推進。睡眠・運動・食事の時間を固定し、判断コストを削減する
    romance:
    - 坤宮の「地を耕す」エネルギーは、既存の関係を深めるのに最適。新しい出会いより現在の縁を大切にする年
    - エニアグラム4の「理想の関係像」を追求しすぎない。完璧な相手を求めるよりも、目の前の人との関係に投資する
    - 'Empathy #1は魅力だが、相手のエネルギーを吸収しすぎるリスクがある。健全な境界線を意識的に設計する'
    - 7月（立花）と11月（再会）が恋愛運のベストタイミング。社交的な場に出ると良い縁がある
    - HSPの特性を理解してくれるパートナーが理想。「静かな時間を共有できる関係」がYumaにとっての最高のパートナーシップ
monthly_2026:
- month: 1月
  nine_star_energy: 70
  nine_star_note: 上昇運
  rokusei_phase: 安定
  work:
    stars: 4
    text: 年始の勢いを活かし新プロジェクト構想を練る。六星占術「安定」の追い風が最大限のサポート。年間計画のグランドデザインをこの月に固めることで、後の実行がスムーズになる。Deliberative（慎重さ）を活かした計画策定に最適な時期。
  money:
    stars: 3
    text: 堅実運用を継続。大きな支出は計画的に。年初の「新年だから何かしたい」衝動に注意。九星の上昇運は「投資判断の質」に使い、金額は保守的に保つ。
  health:
    stars: 4
    text: エネルギー充実。運動習慣の確立に最適な月。正月太り解消を兼ねて、年間の健康ルーティンを設計する。サウナ+筋トレの週間スケジュールをこの月に確定させる。
  romance:
