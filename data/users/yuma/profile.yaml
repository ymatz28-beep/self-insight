# === Interpretations (AI-generated narrative) ===
interpretations:
  integrated_insight:
    - "あなたの本質は<strong>「静かな炎で人を照らし、言葉で変容を導く人」</strong>です。四柱推命の日主「丁火」（ロウソクの炎）× 九星気学の七赤金星（沢の言葉力）× 蠍座（冥王星が司る変容と再生）。この三角形が示すのは、<strong>他者の感情を体感レベルで感じ取り（Empathy #1）、思考の深淵で本質を掘り当て（Intellection #2）、それを言葉の力で世界に届ける</strong>という稀有な才能の組み合わせです。蠍座の水のエレメントは感情の深さと変容力を与え、不動宮（Fixed）の性質は「一度決めたら貫く」執念を示します。"
    - "AB型（日本人口の10%）の合理性×感性の二面性は、あなたの思考回路そのもの。データとフレームワーク（3S, MECE）で構造化しながら、同時に感情の機微も逃さない。この「冷静な分析者」と「感受性の高い直感者」の共存は、蠍座の「表面と深層」の二重構造、木星人(−)×金星人(−)の霊合星人としての二重性、そしてエニアグラム4の「合理と美の統合」と完全に共鳴しています。<strong>相反する特質を矛盾なく統合する力</strong>が、Yumaの最大の特徴です。"
    - "あなたの感覚は、一般より明らかに深く繊細です。環境や人の感情を微細なレベルで察知し、通常は気づかない情報を拾い上げる。蠍座の深い洞察力、七赤金星の社交的アンテナ、Empathyの体感的共感がすべて同じ方向を指している。一方で、<strong>興味が点火されると異常な集中力を発揮し、一つのテーマに何時間も没頭する</strong>。この過集中モードとConnectedness（運命思考 #4）の「全てを繋げて見る力」が組み合わさると、他者には到達できない深さの洞察が生まれます。ただし、興味が移ると別のテーマへ瞬時に飛ぶ — これは弱みではなく、<strong>複数プロジェクトを並行で深掘りし、意外なシナジーを見出す「拡散的探究力」</strong>の源泉です。"
    - "<strong style=\"color:var(--yellow);\">注意すべきポイント — 全体系が一致する弱点</strong>: 五行で<strong>金（決断力・収穫）と水（柔軟性・知恵）が完全に欠如</strong>。蠍座の執着気質 × Deliberative（慎重さ #3）× AB型の分析癖が重なり、<strong>「完璧な答えが出るまで動けない」分析麻痺</strong>に陥りやすい。感覚の繊細さとEmpathy #1は最大の武器ですが、他者のネガティブなエネルギーを吸収しすぎて<strong>自分の境界線が溶ける</strong>リスクが常にある。エニアグラム4はストレス下でType 2に退行し、独自性を捨てて自己犠牲に走る。<strong>仕組み化（自動化・ルーティン・境界線設計）で弱みを構造的にカバーする</strong>ことがYuma OSの本質です。"
  strengths:
    Empathy: "他者の感情を「推測」するのではなく「体感」する。言語化されていない不安や喜びを直感的に察知し、その人が本当に求めていることを理解する力。チームリーダーとしての最大の武器であり、サービス設計においてユーザーの痛みを自分事として感じられるPMFの源泉。"
    Intellection: "思考することそのものが活動。1人の時間に頭の中で概念を回し、深い洞察に到達する。表面的な情報交換ではなく、哲学的な問いや構造的な分析を好む。このダッシュボード自体が、Intellectionが駆動する「自己を体系的に理解したい」という欲求の産物。"
    Deliberative: "リスクを事前に感知し、慎重に選択肢を評価する。衝動的な判断を避け、深い分析に基づいて確実な意思決定をする力。投資判断や事業設計において、見えないリスクを察知する「守りの強み」。ただし行動の遅れにつながるリスクもある。"
    Connectedness: "万物のつながりを直感的に感じ取る。一見無関係に見える出来事やアイデアの間に隠れた関連性を見出す力。占術と心理学と確率論を統合する発想、複数プロジェクト間のシナジーを設計する力の源泉。偶然を必然として捉える世界観。"
    Maximizer: "「平均を良く」するのではなく「良いを最高に」引き上げる。弱みの修正より強みの極大化を追求する。3S原則（Simple, Scalable, Sustainable）の設計思想そのものがMaximizerの発露。「もっと良くできないか？」が止まらない性質。"
  strengths_ja:
    Empathy: "共感性"
    Intellection: "内省"
    Deliberative: "慎重さ"
    Connectedness: "運命思考"
    Maximizer: "最上志向"
  personality:
    enneagram: "自己表現とアイデンティティの探求者。「自分だけの世界観」を持ち、平凡であることを嫌う。健全時はType 1（改革者）に向かい原則と美学を融合。ストレス時はType 2（奉仕者）に向かい、自分を犠牲にして他者に尽くしすぎる傾向。"
    blood_type: "冷静な分析力と繊細な感性が同居。「二面性がある」と言われがちだが、実態は「状況に応じて最適なモードを切り替えている」合理的適応。"
    sensitivity: "環境や人の感情を微細なレベルで処理する繊細さ。蠍座の深い洞察力、Empathy #1の体感的共感と相乗効果を発揮し、通常は見逃す情報を拾い上げる。美しいもの・深い会話からは何倍もの充足を得る一方、ネガティブな刺激からの回復にも時間がかかる。"
    focus_pattern: "興味が点火されると驚異的な集中力を発揮し、何時間も一つのテーマに没頭する。Intellection #2の思考力と組み合わさり、深い洞察を生む原動力。一方で興味の対象が移ると瞬時に切り替わるため、仕組み化（自動化・ルーティン設計）で定型業務を排除することが有効。"
  four_pillars:
    overview: "四柱推命は生年月日時の4つの柱から、先天的な性質・才能・人生の傾向を読み解く東洋最高峰の命術。各柱が人生の異なる側面を表します。"
    year: "草花と兎の組み合わせ。社会に対して柔軟で穏やかな印象を与えるが、木の根のようにしなやかな強さを持つ。先祖から受け継いだ「人を和ませる空気感」。"
    month: "キャリアの柱に太陽の火と忠犬の組み合わせ。仕事では情熱的で忠誠心が強い。丙（太陽）は日主の丁（ロウソク）を支える強い火源 — 仕事にエネルギーの根源がある配置。"
    day: "本質は陰火と未（羊・土）。温かい土壌の上で灯る炎 — 安定した基盤の上で人を照らす使命。未は「未来」の未でもあり、先見性を暗示。"
    day_master_detail: "ロウソクの炎。静かで温かく人を照らす。強い意志を内に秘め、感受性豊かで人の心の機微を感じ取る。丙火（太陽）のような自己主張ではなく、暗闇の中で必要な人にだけ光を届ける繊細な存在。"
  nine_star_ki:
    year: "本命星（七赤金星）は生まれた年から算出される「社会的な自分」。「沢」の象意を持ち、社交的で人を楽しませる力と、言葉に説得力を持つ話術に恵まれています。金星の「金運」は財を呼び込む力ですが、同時に散財しやすい傾向も。方位は西（兌宮）で、収穫と悦びの方角。"
    month: "月命星（九紫火星）は生まれた月から算出される「内面の自分」。外から見える社交的な七赤金星の内側に、九紫火星の激しい情熱と知的好奇心が燃えています。九紫火星は「離」の象意 — 物事を明らかにする光の力。知識欲が旺盛で美意識が高く、直感が鋭い。この本命星と月命星の二層構造が、「表面は穏やかな社交家、内面は激しい探求者」というYumaの二面性を形成しています。"
  rokusei:
    main: "好奇心旺盛で行動力がある星人。自由を重んじ束縛を嫌い、常に新しいことに挑戦したがる冒険者タイプ。社交的で人脈が広く、興味の幅も広い。(−)は偶数年生まれを示し、陰の性質（内向き・慎重）がベースにある。"
    sub: "プライドが高く美意識がある星人。完璧主義的で「こだわり」が強い。人から尊敬されたい欲求が強く、自分の世界観を大切にする。"
    reigou: "霊合星人とは、メインの運命星に加えてサブの運命星の影響も同時に受ける特殊な存在。全人口の約16%が該当し、運気の振れ幅が通常の2倍になります。好調期は通常の人が到達できない高みに届きますが、不調期（大殺界）は通常以上に深く影響を受けます。メイン星とサブ星が好調なら「最高の年」、片方が大殺界なら「矛盾する年」、両方が大殺界なら「最大限の注意が必要な年」。"

